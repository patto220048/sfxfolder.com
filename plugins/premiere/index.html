<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>SFXFolder Web Plugin</title>
    <script>
        // Polyfill and Error Catcher for older CEF
        window.onerror = function (msg, url, line, col, error) {
            var status = document.getElementById('status');
            status.style.color = '#ff4444';
            status.innerText = 'JS ERROR: ' + msg + ' (Line: ' + line + ')';
            console.error('GLOBAL ERROR:', msg, 'at', url, ':', line);
        };

        // Fix for some older environments
        if (typeof global === 'undefined') { window.global = window; }
    </script>
    <style>
        body {
            background-color: #1a1a2e;
            /* Dark Blue - so we know it loaded */
            color: #eee;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #web-container {
            flex: 1;
            border: none;
            background: #000;
        }

        .header {
            padding: 4px 8px;
            background: #111;
            font-size: 9px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            color: #666;
        }

        .status {
            color: #4CAF50;
            font-family: monospace;
        }

        #error-display {
            background: #441111;
            color: #ffaaaa;
            padding: 8px;
            font-size: 11px;
            display: none;
            border-bottom: 1px solid #ff0000;
        }

        .debug-controls {
            padding: 4px;
            background: #111;
            display: flex;
            gap: 4px;
            border-bottom: 1px solid #333;
        }

        button {
            padding: 2px 6px;
            font-size: 9px;
            font-weight: normal;
            text-transform: uppercase;
            border: 1px solid #444;
            border-radius: 2px;
            background: #222;
            color: #aaa;
            cursor: pointer;
        }

        button:hover {
            background: #333;
            color: white;
        }

        .btn-reload {
            background: #0078d4;
            color: white;
            border-color: #0078d4;
        }
    </style>
</head>

<body>
    <div id="error-display"></div>
    <div class="header">
        <span style="color:#ffcc00; font-weight:bold;">SFXFolder V2.0</span>
        <span id="status" class="status">Connecting...</span>
    </div>

    <div class="debug-controls" id="debug-toolbar" style="display: none;">
        <button onclick="reloadWeb('https://sfxfolder.com/plugins/premiere')">PROD</button>
        <button onclick="reloadWeb('http://localhost:3000/plugins/premiere')">3000</button>
        <button class="btn-reload" onclick="location.reload()">RELOAD PANEL</button>
        <button id="btn-clear-cache" style="background: #d40000; color: white; border-color: #d40000;">CLEAR CACHE</button>
        <div id="path-display" style="font-size: 8px; color: #888; margin-left: auto; align-self: center;"></div>
    </div>

    <iframe id="web-container" src="https://sfxfolder.com/plugins/premiere?mode=plugin"></iframe>

    <div id="download-progress" style="position:fixed;bottom:0;width:100%;height:4px;background:#333;display:none;">
        <div id="progress-bar" style="width:0%;height:100%;background:#0078d4;"></div>
    </div>

    <script src="./lib/CSInterface.js"></script>

    <script>
        // Secret debug toggle: Alt + Click anywhere
        document.addEventListener('click', function(e) {
            if (e.altKey) {
                var toolbar = document.getElementById('debug-toolbar');
                if (toolbar) {
                    toolbar.style.display = toolbar.style.display === 'none' ? 'flex' : 'none';
                    console.log("Debug toolbar toggled:", toolbar.style.display);
                }
            }
        });

        function showError(msg) {
            var div = document.getElementById('error-display');
            div.style.display = 'block';
            div.innerText = msg;
        }

        function reloadWeb(url) {
            if (url.indexOf('mode=plugin') === -1) {
                url += (url.indexOf('?') === -1 ? '?' : '&') + 'mode=plugin';
            }
            document.getElementById('web-container').src = url;
            document.getElementById('status').innerText = "LOAD: " + url.split('?')[0];
        }

        try {
            var csInterface = new CSInterface();
            var EXT_VERSION = "1.0.3"; // Cập nhật đồng bộ với app
            document.getElementById('status').innerText = "Connected v" + EXT_VERSION;

            // Gửi phiên bản cho iframe ngay khi nó load xong
            document.getElementById('web-container').onload = function () {
                this.contentWindow.postMessage({
                    type: 'SET_EXT_VERSION',
                    version: EXT_VERSION
                }, '*');
            };

            if (typeof require !== 'undefined') {
                var fs = require('fs');
                var path = require('path');
                var https = require('https');
                var http = require('http');
                var os = require('os');

                var downloadFolder = process.platform === 'win32' 
                    ? path.join(process.env.APPDATA, 'SFXFolder', 'Library')
                    : path.join(os.homedir(), 'Library', 'Application Support', 'SFXFolder', 'Library');
                
                if (!fs.existsSync(downloadFolder)) { 
                    try {
                        fs.mkdirSync(downloadFolder, { recursive: true }); 
                    } catch (e) {
                        console.error("Failed to create directory:", e);
                    }
                }

                // Display path in UI (for debug only)
                document.getElementById('path-display').innerText = ".../" + path.basename(path.dirname(downloadFolder)) + "/" + path.basename(downloadFolder);

                // Handle Clear Cache
                document.getElementById('btn-clear-cache').onclick = function() {
                    if (confirm("Are you sure you want to clear plugin cache? All downloaded files will remain on disk, but UI will reset.")) {
                        localStorage.removeItem('premiere_plugin_cache');
                        localStorage.removeItem('premiere_plugin_cache_v');
                        // Notify iframe to clear its local storage too
                        var iframe = document.getElementById('web-container');
                        if (iframe && iframe.contentWindow) {
                            iframe.contentWindow.postMessage({ type: 'CLEAR_PLUGIN_CACHE' }, '*');
                        }
                        alert("Cache cleared. Reloading panel...");
                        location.reload();
                    }
                };

                window.addEventListener('message', function (event) {
                    console.log("Panel received message:", event.data);

                    if (event.data.type === 'DEBUG_LOG') {
                        console.log("IFRAME DEBUG:", event.data.message);
                        return;
                    }

                    if (event.data.type === 'OPEN_URL') {
                        console.log("Opening URL:", event.data.url);
                        if (window.cep && window.cep.util && window.cep.util.openURLInDefaultBrowser) {
                            window.cep.util.openURLInDefaultBrowser(event.data.url);
                        } else if (typeof csInterface !== 'undefined' && csInterface.openURLInDefaultBrowser) {
                            csInterface.openURLInDefaultBrowser(event.data.url);
                        }
                        return;
                    }

                    if (event.data.type === 'SAVE_AUTH') {
                        localStorage.setItem('re_src_plugin_auth', JSON.stringify(event.data.payload));
                        return;
                    }

                    if (event.data.type === 'GET_AUTH') {
                        var authData = localStorage.getItem('re_src_plugin_auth');
                        if (authData) {
                            try {
                                document.getElementById('web-container').contentWindow.postMessage({ type: 'AUTH_DATA', payload: JSON.parse(authData) }, '*');
                            } catch (e) { }
                        }
                        return;
                    }

                    if (event.data.type === 'CLEAR_AUTH') {
                        localStorage.removeItem('re_src_plugin_auth');
                        return;
                    }

                    // --- New Resource Status Tracking ---
                    if (event.data.type === 'CHECK_RESOURCE_STATUS') {
                        var rid = event.data.resourceId;
                        var fileName = event.data.fileName;
                        if (!rid || !fileName) {
                            event.source.postMessage({ type: 'RESOURCE_STATUS', resourceId: rid, exists: false }, '*');
                            return;
                        }
                        
                        console.log("[CHECK_CACHE] Request for ID:", rid);
                        var ext = event.data.fileFormat || "";
                        if (ext && ext.indexOf(".") !== 0) ext = "." + ext;
                        var cachedPath = path.join(downloadFolder, rid + (ext || ".dat"));
                        var exists = false;
                        
                        try {
                            exists = fs.existsSync(cachedPath) && fs.lstatSync(cachedPath).isFile();
                        } catch (e) {
                            exists = false;
                        }
                        
                        console.log("[CHECK_CACHE] Path:", cachedPath, "Result:", exists);
                        
                        event.source.postMessage({
                            type: 'RESOURCE_STATUS',
                            resourceId: rid,
                            exists: exists
                        }, '*');
                        return;
                    }

                    var activeDownloads = window._activeDownloads || {};
                    window._activeDownloads = activeDownloads;

                    if (event.data.type === 'IMPORT_ASSET' || event.data.type === 'DOWNLOAD_RESOURCE') {
                        var fileName = event.data.fileName;
                        var resourceId = event.data.resourceId || 'unknown';
                        var displayName = (event.data.displayName || fileName || "").replace(/\.[^/.]+$/, ""); 
                        var ext = event.data.fileFormat || "";
                        if (ext && ext.indexOf(".") !== 0) ext = "." + ext;
                        var url = event.data.url;

                        // Check if file already exists in cache (Use ID + proper extension)
                        var cachedPath = path.join(downloadFolder, resourceId + (ext || ".dat"));
                        if (fs.existsSync(cachedPath)) {
                            console.log("Asset already cached, importing directly:", cachedPath);
                            importAssetToPremiere(cachedPath, resourceId, displayName);
                            return;
                        }

                        if (activeDownloads[resourceId]) {
                            console.log("Download already in progress for:", resourceId);
                            return;
                        }

                        var status = document.getElementById('status');
                        status.innerText = "Processing: " + displayName;

                        activeDownloads[resourceId] = true;
                        downloadFile(url, cachedPath, fileName, resourceId, displayName);
                    }
                });
            } else {
                showError("Node.js is DISABLED. Please check manifest.xml <Parameter>--enable-nodejs</Parameter>");
            }
        } catch (e) {
            showError("System Error: " + e.message);
        }

        function importAssetToPremiere(filePath, resourceId, displayName) {
            var status = document.getElementById('status');
            status.innerText = "Adding to Premiere...";
            var safePath = filePath.replace(/\\/g, '/');
            // Gửi cả đường dẫn file và tên hiển thị sạch cho ExtendScript
            csInterface.evalScript('importToTimeline("' + safePath + '", "' + displayName + '")', function (result) {
                status.innerText = result || "Done";
                // Notify iframe that import is complete
                var iframe = document.getElementById('web-container');
                if (iframe && iframe.contentWindow) {
                    iframe.contentWindow.postMessage({
                        type: 'IMPORT_COMPLETE',
                        resourceId: resourceId,
                        success: true
                    }, '*');
                }
            });
        }

        function downloadFile(url, dest, originalName, resourceId, displayName) {
            var status = document.getElementById('status');
            var progressBar = document.getElementById('progress-bar');
            var iframe = document.getElementById('web-container');
            
            document.getElementById('download-progress').style.display = 'block';
            progressBar.style.width = '0%';

            var file = fs.createWriteStream(dest);
            var protocol = url.startsWith('https') ? https : http;

            var request = protocol.get(url, function (response) {
                if (response.statusCode !== 200) {
                    status.innerText = "Download Error: " + response.statusCode;
                    document.getElementById('download-progress').style.display = 'none';
                    file.close();
                    fs.unlink(dest, function () { });
                    if (window._activeDownloads) delete window._activeDownloads[resourceId];
                    return;
                }

                var len = parseInt(response.headers['content-length'], 10);
                var cur = 0;

                response.on('data', function (chunk) {
                    cur += chunk.length;
                    if (len) {
                        var percent = (100.0 * cur / len).toFixed(2);
                        progressBar.style.width = percent + '%';
                        
                        // Notify iframe of progress
                        if (iframe && iframe.contentWindow) {
                            iframe.contentWindow.postMessage({
                                type: 'DOWNLOAD_PROGRESS',
                                resourceId: resourceId,
                                progress: percent
                            }, '*');
                        }
                    }
                });

                response.pipe(file);

                file.on('finish', function () {
                    file.close(function () {
                        if (window._activeDownloads) delete window._activeDownloads[resourceId];
                        document.getElementById('download-progress').style.display = 'none';
                        
                        // Notify iframe download is done
                        if (iframe && iframe.contentWindow) {
                            iframe.contentWindow.postMessage({
                                type: 'DOWNLOAD_COMPLETE',
                                resourceId: resourceId,
                                success: true
                            }, '*');
                        }

                        importAssetToPremiere(dest, resourceId, displayName);
                    });
                });
            });

            request.on('error', function (err) {
                if (window._activeDownloads) delete window._activeDownloads[resourceId];
                status.innerText = "Connection Error: " + err.message;
                document.getElementById('download-progress').style.display = 'none';
                file.close();
                fs.unlink(dest, function () { });
                
                if (iframe && iframe.contentWindow) {
                    iframe.contentWindow.postMessage({
                        type: 'DOWNLOAD_ERROR',
                        resourceId: resourceId,
                        error: err.message
                    }, '*');
                }
            });
        }
    </script>
</body>

</html>
